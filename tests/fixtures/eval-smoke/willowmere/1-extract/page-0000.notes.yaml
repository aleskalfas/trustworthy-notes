    kind: text
    excerpt: >-
      The village of Willowmere sits in a shallow valley where two streams meet.
    source: body
  - id: e-2
    kind: text
    excerpt: >-
      Its oldest houses were built from grey river stone, and their roofs were
      thatched with reed cut from the marsh each autumn.
    source: body
  - id: e-3
    kind: text
    excerpt: >-
      A stone bridge, raised in the spring of 1842, still carries the lane across
      the eastern stream.
    source: body
  - id: e-4
    kind: text
    excerpt: >-
      The bridge date is recorded on a small plaque set into its northern wall.
    source: footnote
