# Project-side adopter config for the project-management capability.
# Configured for trustworthy-notes — single-repo, github.com, label-fallback mode.

schema_version: 1

# Default branch for branch-name generation + base-branch enforcement
# (per [project-management:DEC-013-branch-and-pr-conventions]).
default_branch: main

# GitHub host pin (per [project-management:DEC-023-gh-host-and-owner]). The
# ambient `gh` default on this machine is github.ibm.com (IBM Enterprise), but
# this repo lives on public github.com. `gh issue create/edit` infer the host
# from the remote, but `gh api` calls (milestone lookup, etc.) do not — so we
# pin the host explicitly to keep every capability script on github.com.
gh:
  host: github.com

# No Projects v2 board today — Priority and Workstream fall back to
# `priority:*` / `workstream:*` labels per
# [project-management:DEC-012-classification-axes].
has_projects_v2_board: false

# Pre-close triage lead-time in days (per
# [project-management:DEC-016-time-bound-containers]).
pre_close_triage_lead_days: 3

# Transitional shim — pre-check.py still requires this field, but the
# canonical workstreams list lives in project/workstreams.yaml per
# [project-management:DEC-018-workstream-taxonomy-and-lifecycle].
workstreams: []

# Milestone categories per [project-management:DEC-016-time-bound-containers].
# trustworthy-notes is feature-driven (releases when work lands); Milestones
# serve as outcome bundles wrapping related EPICs that close together — e.g. a
# "core pipeline" bundle now, an "adoption / v1" bundle later. One category
# (no calendar) is enough; "development → adoption" is milestone sequencing,
# not a workstream.
milestone_categories:
  milestone:
    title_format: "Milestone {n}: {name}"
    close_trigger_default: content-based
    description: "Outcome bundle of related EPICs; closes when every child EPIC closes. No date."

# Review-mode configuration per [project-management:DEC-027-review-modes]
# and [project-management:DEC-028-agent-as-approver-paths].
#
# Agent-mode (the default) with the capability's default `reviewer` agent
# registered for the local path. Solo project — no bot identity for the remote
# path yet; `done-work --bypass "<reason>"` is the documented escape hatch.
review:
  mode: agent
  agents:
    local_registered:
      - name: reviewer
