# Permission profile: non-destructive (per ADR-005). Domain work without
# destructive power — git, gh, the kit CLI, repo reads. Assumes the low-risk
# native-allow shell tier (text-processing / fs-cleanup / temp-files) when
# present; the guardrail floor (recursive rm, sudo, force-push) always denies
# underneath. read-only ⊂ non-destructive ⊂ autonomous.
schema_version: 1

description: Domain work, no destructive power — vcs, issue-tracker, kit, repo-read.
posture: lenient
grants:
  - subject: all
    privilege:
      - "[privilege-catalog:vcs]"
      - "[privilege-catalog:issue-tracker]"
      - "[privilege-catalog:kit]"
      - "[privilege-catalog:repo-read]"
    effect: allow
